name: CI/CD Pipeline

on:
  push:
    branches:
      - master
  pull_request:
    branches:
      - master

jobs:
  lint:
    name: Lint & Validate
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'

      - name: Validate PHP syntax
        run: find . -name "*.php" -not -path "./.git/*" | xargs -I{} php -l {}

      - name: Validate HTML
        run: |
          sudo apt-get install -y tidy
          # Treat PHP file as HTML for basic structure validation (ignore PHP tags)
          grep -v "<?php\|?>" index.php > /tmp/index.html || true
          tidy -errors -quiet /tmp/index.html || true

      - name: Check JavaScript syntax
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Lint JavaScript
        run: npx --yes acorn --ecma2020 --module script.js > /dev/null

  deploy:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: lint
    if: github.ref == 'refs/heads/master' && github.event_name == 'push'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy via FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          server-dir: ${{ secrets.FTP_SERVER_DIR }}
          exclude: |
            **/.git*
            **/.git*/**
            **/README.md
